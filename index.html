<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotejador de Redes (Endian vs HZ)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Colores de coincidencia optimizados para fondo oscuro */
        .match-true { background-color: #064e3b; color: #34d399; font-weight: bold; text-align: center; }
        .match-false { background-color: #7f1d1d; color: #fca5a5; font-weight: bold; text-align: center; }
    </style>
</head>
<body class="bg-black text-gray-200 p-6 antialiased">

    <div class="max-w-7xl mx-auto bg-gray-950 p-8 rounded-2xl shadow-2xl border border-gray-900 mb-8">
        
        <div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-8 pb-6 border-b border-gray-900">
            <div class="flex-shrink-0">
                <img src="logo.png" alt="Logotipo Hospital Héroes de Malvinas" class="w-[240px] h-auto rounded-xl shadow-lg border border-gray-900 bg-gray-950 p-2">
            </div>
            <div class="text-center md:text-right flex-1">
                <h1 class="text-3xl font-extrabold text-orange-500 mb-2 tracking-tight">🔄 Cotejador de Bases de Redes</h1>
                <p class="text-base text-gray-400">Sube los archivos de ENDIAN y HZ para contrastar IPs por dirección MAC.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="border-2 border-dashed border-gray-800 bg-gray-900/50 rounded-xl p-6 text-center hover:border-orange-500/50 transition cursor-pointer">
                <label class="block text-lg font-bold mb-3 text-gray-300">1. Base ENDIAN (Excel/CSV)</label>
                <input type="file" id="fileEndian" accept=".xlsx, .xls, .csv" class="w-full text-sm text-gray-400 file:mr-4 file:py-2.5 file:px-5 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-gray-800 file:text-orange-400 hover:file:bg-gray-700 transition">
            </div>
            <div class="border-2 border-dashed border-gray-800 bg-gray-900/50 rounded-xl p-6 text-center hover:border-orange-500/50 transition cursor-pointer">
                <label class="block text-lg font-bold mb-3 text-gray-300">2. Base HZ (Excel/CSV)</label>
                <input type="file" id="fileHz" accept=".xlsx, .xls, .csv" class="w-full text-sm text-gray-400 file:mr-4 file:py-2.5 file:px-5 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-gray-800 file:text-orange-400 hover:file:bg-gray-700 transition">
            </div>
        </div>

        <div class="text-center mb-8">
            <button id="btnProcesar" class="bg-orange-600 hover:bg-orange-500 text-white font-bold text-base py-3 px-8 rounded-xl shadow-lg shadow-orange-900/20 transition hidden transform hover:scale-[1.02] active:scale-[0.98]">
                ⚡ Procesar y Comparar
            </button>
        </div>

        <div id="filtros" class="mb-6 hidden flex justify-end gap-3 text-sm">
            <button onclick="filtrarTabla('todos')" class="bg-gray-900 hover:bg-gray-800 border border-gray-800 text-gray-200 px-4 py-2 rounded-lg font-medium transition">Mostrar Todos</button>
            <button onclick="filtrarTabla('errores')" class="bg-red-950/40 hover:bg-red-900/40 text-red-400 border border-red-900/50 px-4 py-2 rounded-lg font-semibold transition">Solo Incongruencias</button>
        </div>

        <div class="overflow-x-auto border border-gray-900 rounded-xl shadow-inner max-h-[650px] bg-gray-950">
            <table class="min-w-full divide-y divide-gray-900 text-base hidden" id="tablaResultados">
                <thead class="bg-gray-900 sticky top-0 backdrop-blur-md">
                    <tr>
                        <th class="px-5 py-4 text-left font-bold text-gray-400 tracking-wide uppercase text-xs">MAC</th>
                        <th class="px-5 py-4 text-left font-bold text-gray-400 tracking-wide uppercase text-xs">Servicio (Endian / HZ)</th>
                        <th class="px-5 py-4 text-center font-bold text-gray-400 tracking-wide uppercase text-xs">IP Local</th>
                        <th class="px-5 py-4 text-center font-bold text-gray-400 tracking-wide uppercase text-xs">IP Provincial</th>
                        <th class="px-5 py-4 text-center font-bold text-gray-400 tracking-wide uppercase text-xs">IP Laboratorio</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla" class="divide-y divide-gray-900 bg-black/20">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let datosEndian = [];
        let datosHz = [];

        document.getElementById('fileEndian').addEventListener('change', (e) => procesarArchivo(e, 'endian'));
        document.getElementById('fileHz').addEventListener('change', (e) => procesarArchivo(e, 'hz'));

        function procesarArchivo(evento, tipo) {
            const file = evento.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                const json = XLSX.utils.sheet_to_json(worksheet);
                
                const datosNormalizados = json.map(row => {
                    let newRow = {};
                    for (let key in row) {
                        let normalizedKey = key.trim().toLowerCase().replace(/\s+/g, '');
                        newRow[normalizedKey] = String(row[key]).trim();
                    }
                    return newRow;
                });

                if (tipo === 'endian') datosEndian = datosNormalizados;
                if (tipo === 'hz') datosHz = datosNormalizados;

                if (datosEndian.length > 0 && datosHz.length > 0) {
                    document.getElementById('btnProcesar').classList.remove('hidden');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function limpiarMac(mac) {
            if (!mac) return "";
            let match = mac.match(/([0-9a-fA-F]{2}:){5}[0-9a-fA-F]{2}/);
            return match ? match[0].toUpperCase() : mac.toUpperCase().trim();
        }

        document.getElementById('btnProcesar').addEventListener('click', () => {
            const cuerpo = document.getElementById('cuerpoTabla');
            cuerpo.innerHTML = ""; 

            let mapHz = {};
            datosHz.forEach(item => {
                let macClean = limpiarMac(item.mac || item.macaddress);
                if (macClean) mapHz[macClean] = item;
            });

            datosEndian.forEach(itemEndian => {
                let macClean = limpiarMac(itemEndian.mac || itemEndian.macaddress);
                if (!macClean) return; 

                let itemHz = mapHz[macClean];
                
                let servicioEndian = itemEndian.servicio || "No especificado";
                let servicioHz = itemHz ? (itemHz.servicio || "No especificado") : "<span class='text-orange-400 font-semibold'>No encontrado en HZ</span>";

                let ipLocalA = itemEndian.iplocal || "";
                let ipLocalB = itemHz ? (itemHz.iplocal || "") : "";
                
                let ipProvA = itemEndian.ipprovincial || "";
                let ipProvB = itemHz ? (itemHz.ipprovincial || "") : "";

                let ipLabA = itemEndian.iplaboratorio || "";
                let ipLabB = itemHz ? (itemHz.iplaboratorio || "") : "";

                let matchLocal = (ipLocalA === ipLocalB) && itemHz;
                let matchProv = (ipProvA === ipProvB) && itemHz;
                let matchLab = (ipLabA === ipLabB) && itemHz;

                let tieneErrores = !matchLocal || !matchProv || !matchLab;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-900 transition row-resultado";
                tr.setAttribute('data-error', tieneErrores ? "true" : "false");

                tr.innerHTML = `
                    <td class="px-5 py-4 font-mono text-sm text-gray-300 font-semibold tracking-wider">${macClean}</td>
                    <td class="px-5 py-4 text-sm text-gray-300">
                        <div class="font-bold text-gray-400">E: ${servicioEndian}</div>
                        <div class="text-orange-400/90 mt-0.5">H: ${servicioHz}</div>
                    </td>
                    <td class="px-5 py-4 text-sm text-center ${matchLocal ? 'match-true' : 'match-false'}">
                        <div>E: ${ipLocalA || '-'}</div>
                        <div class="border-t border-white/10 my-1"></div>
                        <div>H: ${ipLocalB || '-'}</div>
                        <div class="text-[11px] mt-1.5 opacity-90">${matchLocal ? '✓ Match' : '✗ Error'}</div>
                    </td>
                    <td class="px-5 py-4 text-sm text-center ${matchProv ? 'match-true' : 'match-false'}">
                        <div>E: ${ipProvA || '-'}</div>
                        <div class="border-t border-white/10 my-1"></div>
                        <div>H: ${ipProvB || '-'}</div>
                        <div class="text-[11px] mt-1.5 opacity-90">${matchProv ? '✓ Match' : '✗ Error'}</div>
                    </td>
                    <td class="px-5 py-4 text-sm text-center ${matchLab ? 'match-true' : 'match-false'}">
                        <div>E: ${ipLabA || '-'}</div>
                        <div class="border-t border-white/10 my-1"></div>
                        <div>H: ${ipLabB || '-'}</div>
                        <div class="text-[11px] mt-1.5 opacity-90">${matchLab ? '✓ Match' : '✗ Error'}</div>
                    </td>
                `;
                cuerpo.appendChild(tr);
            });

            document.getElementById('tablaResultados').classList.remove('hidden');
            document.getElementById('filtros').classList.remove('hidden');
        });

        function filtrarTabla(tipo) {
            const filas = document.querySelectorAll('.row-resultado');
            filas.forEach(fila => {
                if (tipo === 'errores') {
                    if (fila.getAttribute('data-error') === 'true') {
                        fila.style.display = '';
                    } else {
                        fila.style.display = 'none';
                    }
                } else {
                    fila.style.display = '';
                }
            });
        }
    </script>
</body>
</html>
